name: GovtJobReferrer Daily Run

on:
  schedule:
    - cron: "30 1 * * *"
    - cron: "30 8 * * *"
  workflow_dispatch:

jobs:
  scrape-and-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Chrome
        run: |
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable poppler-utils
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Run
        env:
          AWS_SES_SMTP_HOST: ${{ secrets.AWS_SES_SMTP_HOST }}
          AWS_SES_SMTP_PORT: ${{ secrets.AWS_SES_SMTP_PORT }}
          AWS_SES_SMTP_USER: ${{ secrets.AWS_SES_SMTP_USER }}
          AWS_SES_SMTP_PASSWORD: ${{ secrets.AWS_SES_SMTP_PASSWORD }}
          AWS_SES_FROM_EMAIL: ${{ secrets.AWS_SES_FROM_EMAIL }}
          AWS_SES_FROM_NAME: ${{ secrets.AWS_SES_FROM_NAME }}
          EBOOK_REFERRAL_URL: ${{ secrets.EBOOK_REFERRAL_URL }}
          HEADLESS_BROWSER: "true"
        run: python main.py
