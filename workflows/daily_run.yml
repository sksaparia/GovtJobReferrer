name: GovtJobReferrer — Daily Scrape & Email

on:
  schedule:
    # Runs at 7:00 AM IST (1:30 AM UTC) and 2:00 PM IST (8:30 AM UTC)
    - cron: "30 1 * * *"
    - cron: "30 8 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no emails sent)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  scrape-and-email:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────────────
      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Install Chrome for Selenium ───────────────────────────────
      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      # ── 4. Install system deps for pdfplumber ────────────────────────
      - name: Install System Dependencies
        run: |
          sudo apt-get install -y poppler-utils

      # ── 5. Install Python packages ────────────────────────────────────
      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      # ── 6. Create required directories ───────────────────────────────
      - name: Prepare Directories
        run: |
          mkdir -p data/pdfs logs

      # ── 7. Restore cached student data ───────────────────────────────
      - name: Restore Student Data Cache
        uses: actions/cache@v4
        with:
          path: |
            data/students.csv
            data/pdfs/
          key: student-data-${{ github.run_id }}
          restore-keys: |
            student-data-

      # ── 8. Run the pipeline ───────────────────────────────────────────
      - name: Run GovtJobReferrer Pipeline
        env:
          AWS_SES_SMTP_HOST:     ${{ secrets.AWS_SES_SMTP_HOST }}
          AWS_SES_SMTP_PORT:     ${{ secrets.AWS_SES_SMTP_PORT }}
          AWS_SES_SMTP_USER:     ${{ secrets.AWS_SES_SMTP_USER }}
          AWS_SES_SMTP_PASSWORD: ${{ secrets.AWS_SES_SMTP_PASSWORD }}
          AWS_SES_FROM_EMAIL:    ${{ secrets.AWS_SES_FROM_EMAIL }}
          AWS_SES_FROM_NAME:     ${{ secrets.AWS_SES_FROM_NAME }}
          EBOOK_REFERRAL_URL:    ${{ secrets.EBOOK_REFERRAL_URL }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          HEADLESS_BROWSER:      "true"
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python main.py $DRY_RUN_FLAG

      # ── 9. Upload logs as artifact ────────────────────────────────────
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7

      # ── 10. Commit updated student CSV back to repo ───────────────────
      - name: Commit Student Data Updates
        if: success()
        run: |
          git config user.name  "GovtJobReferrer Bot"
          git config user.email "bot@govtjobreferrer.github"
          git add data/students.csv || true
          git diff --staged --quiet || git commit -m "chore: update student data [$(date +'%Y-%m-%d %H:%M')]"
          git push || true

# ── Keep-Alive Workflow (prevent GitHub from disabling scheduled jobs) ──────
---
name: Keep-Alive Ping

on:
  schedule:
    - cron: "0 12 */20 * *"   # Every 20 days at noon UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Keep workflows alive
        run: echo "Keep-alive ping — $(date)"
